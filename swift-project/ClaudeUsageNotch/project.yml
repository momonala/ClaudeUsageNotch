name: ClaudeUsageNotch
options:
  bundleIdPrefix: com.claudeusagenotch
  deploymentTarget:
    macOS: "12.0"
  createIntermediateGroups: true
  generateEmptyDirectories: true

settings:
  base:
    SWIFT_VERSION: "5.9"
    MACOSX_DEPLOYMENT_TARGET: "12.0"
    PRODUCT_BUNDLE_IDENTIFIER: com.claudeusagenotch.ClaudeUsageNotch
    MARKETING_VERSION: "0.1.0"
    CURRENT_PROJECT_VERSION: "1"
    CODE_SIGN_STYLE: Automatic
    DEVELOPMENT_TEAM: ""  # Set to your 10-char Apple Team ID before notarizing: https://developer.apple.com/account
    ENABLE_HARDENED_RUNTIME: YES
    INFOPLIST_FILE: Sources/Resources/Info.plist
    CODE_SIGN_ENTITLEMENTS: Sources/Resources/ClaudeUsageNotch.entitlements
    LD_RUNPATH_SEARCH_PATHS: "$(inherited) @executable_path/../Frameworks"

targets:
  ClaudeUsageNotch:
    type: application
    platform: macOS
    sources:
      - path: Sources
        excludes:
          - "Resources/Info.plist"
          - "Resources/ClaudeUsageNotch.entitlements"
    resources:
      - path: Sources/Resources/Assets.xcassets
      - path: Sources/Resources/BrandIcons
    info:
      path: Sources/Resources/Info.plist
      properties:
        CFBundleName: ClaudeUsageNotch
        CFBundleDisplayName: Claude Usage Notch
        CFBundleIdentifier: com.claudeusagenotch.ClaudeUsageNotch
        CFBundleShortVersionString: "0.1.0"
        CFBundleVersion: "1"
        LSMinimumSystemVersion: "12.0"
        LSUIElement: true
        NSPrincipalClass: NSApplication
        NSSupportsAutomaticTermination: false
        NSSupportsSuddenTermination: false
        NSHumanReadableCopyright: "Copyright © 2026 Ian Silva. MIT License."
        NSAppTransportSecurity:
          NSAllowsArbitraryLoads: false
        ITSAppUsesNonExemptEncryption: false
    settings:
      base:
        GENERATE_INFOPLIST_FILE: NO
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon

  ClaudeUsageNotchTests:
    type: bundle.unit-test
    platform: macOS
    sources:
      - path: Tests
    dependencies:
      - target: ClaudeUsageNotch
    settings:
      base:
        GENERATE_INFOPLIST_FILE: YES
